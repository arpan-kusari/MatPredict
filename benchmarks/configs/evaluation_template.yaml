# Evaluation template for benchmarks/scripts/evaluation.py.
# Recommended command:
#   cd /path/to/MatPredict/benchmarks
#   python scripts/evaluation.py --config ./configs/evaluation_template.yaml
#
# Split protocol:
# - Object-disjoint: split_file: ./dataset/splits/object_disjoint_v1.yaml
#   Samples are grouped by object id; held-out objects do not appear elsewhere.
# - Variance-disjoint: split_file: ./dataset/splits/variance_disjoint_v1.yaml
#   Samples are grouped by variant id, such as var000/var001.
# - "Disjoint" means the grouping key is not shared by train/val/test.
# Use split: train, val, or test to select the subset inside that split file.
#
# Model choice must match the checkpoint:
# - resnet50_unet
# - swin_t_unet
#
# Task choice must also match the checkpoint:
# - Inverse rendering: task_mode: pbr
# - Material segmentation: task_mode: material

dataset_root: '/path/to/MatPredictDataset'
split_file: ./dataset/splits/object_disjoint_v1.yaml
split: test

model_name: swin_t_unet
checkpoint: ./outputs/object_disjoint_swin_t_pbr/checkpoints/swin_t_unet_best.pth

image_size: 512
batch_size: 1
num_workers: 8

# Use pbr for inverse rendering, or material for material segmentation.
task_mode: pbr

# Inverse-rendering metric/loss weights. Used only when task_mode is pbr.
albedo_weight: 1.0
roughness_weight: 1.0
metallic_weight: 1.0

# Material-segmentation settings. Used only when task_mode is material.
# Typical material setup:
#   task_mode: material
#   material_num_classes: 8
#   material_weight: 0.0
#   material_ce_weight: 1.0
material_weight: 0.0
material_ce_weight: 1.0
material_num_classes: null
material_map_file: null
material_ignore_background: false

seed: 42

output_dir: ./eval_outputs/object_disjoint_swin_t_pbr
log_path: logs/eval_{ts}.log

# Visualization sampling (for fair cross-method comparison)
save_visualizations: true
num_vis_samples: 12
vis_seed: 42
vis_ids_file: null
